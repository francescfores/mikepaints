<div

  class=" flex-grow-0 flex-shrink-0 left-0  bg-bgPrim text-textPrimary
       px-0 z-40 pt-16 opacity-95
        duration-500 transition-all   h-[100vh] mt-16 md:mt-20
       gap-12  fixed overflow-y-auto scrollbar-corner-bgPrim overflow-hidden sm:overflow-x-hidden pb-2
      ">
<div class="flex flex-col font-bold justify-center items-center gap-12 text-left pt-20 text-2xl transition-all duration-500 ease-in-out">

  <!-- PINTURA -->
  <div class="w-full text-center flex flex-col gap-10">
    <button
      class="w-full my-2"
      (click)="closeSidebarAndScroll('wargames')">
      Pintura wargames
    </button>

    <div  [ngClass]="openMenu === 'painting' ? 'max-h-40 opacity-100 mt-4' : 'max-h-0 opacity-0 overflow-hidden'"  class="flex flex-col gap-6 text-lg  transition-all duration-500 ease-in-out">
      <a (click)="closeSidebarAndScroll('about')">Calidad tabletop</a>
      <a (click)="closeSidebarAndScroll('about')">Calidad estandard</a>
      <a (click)="closeSidebarAndScroll('about')">Calidad de exposición</a>
    </div>
  </div>
-->
  <!-- RESINAS -->
  <div class="w-full text-center">
    <button
      class="w-full py-2"
      (click)="closeSidebarAndScroll('resinas')">
      Pintura resinas
    </button>

    <div [ngClass]="openMenu === 'resinas' ? 'max-h-40 opacity-100 mt-4' : 'max-h-0 opacity-0 overflow-hidden'"  class="flex flex-col gap-6 text-lg mt-2 transition-all duration-500 ease-in-out">
      <a (click)="closeSidebarAndScroll('activities')">Modelos premium</a>
      <a (click)="closeSidebarAndScroll('activities')">Modelos personalizados</a>
      <a (click)="closeSidebarAndScroll('activities')">Imprimación y preparacion</a>
    </div>
  </div>


  <div class="w-full text-center">
    <button
      class="w-full py-2"
      (click)="toggleMenu('impre')">

    </button>

    <div [ngClass]="openMenu === 'impre' ? 'max-h-40 opacity-100 mt-4' : 'max-h-0 opacity-0 overflow-hidden'"  class="flex flex-col gap-6 text-lg mt-2transition-all duration-500 ease-in-out">

      <a (click)="closeSidebarAndScroll('activities')">Impresion en PLA</a>
    </div>
  </div>

  <div class="w-full text-center">
    <button
      class="w-full py-2"
      (click)="toggleMenu('gallery')">

  <div class="w-full text-center">
    <button

      (click)="closeSidebarAndScroll('contact')">
