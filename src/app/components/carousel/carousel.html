<div class="bg-blacks smin-h-screen flex items-center justify-center overflow-hidden p-4 sm:p-8">
<!-- Background effects -->
<div class="fixed inset-0 -z-10 hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-violet-900/20 via-purple-900/20 to-fuchsia-900/20"></div>
    <div class="absolute top-1/4 left-1/4 w-48 h-48 sm:w-96 sm:h-96 bg-violet-500/10 rounded-full filter blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-48 h-48 sm:w-96 sm:h-96 bg-fuchsia-500/10 rounded-full filter blur-3xl"></div>
</div>

<!-- Main container -->
<div class="w-full max-w-6xl mx-auto">
    <!-- Carousel container -->
    <div class="carousel-container relative ">
        <!-- Progress bar -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-white/10 rounded-full overflow-hidden z-20">
            <div class="progress-bar absolute top-0 left-0 h-full bg-gradient-to-r from-violet-500 to-fuchsia-500" 
                 [style.width.%]="progressWidth()"></div>
        </div>

        <!-- Navigation buttons -->
        <a class="nav-button absolute left-2 sm:left-4 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center z-20 text-white touch-manipulation" 
                (click)="prevSlide()" 
                title="Previous slide">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
        </a>
        
        <a class="nav-button absolute right-2 sm:right-4 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center z-20 text-white touch-manipulation" 
                (click)="nextSlide()" 
                title="Next slide">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </a>

        <!-- Carousel track -->
        <div class="carousel-track relative h-[400px] sm:h-[500px] md:h-[600px] overflow-hidden"
             (touchstart)="onTouchStart($event)"
             (touchend)="onTouchEnd($event)">
            
            @for (slide of slides(); track slide.id; let idx = $index) {
                <div class="carousel-item absolute top-1 left-0 w-full h-full"
                     [class.active]="idx === currentSlide()"
                     [class.next]="idx === getNextIndex()"
                     [class.prev]="idx === getPrevIndex()"
                     [class.hidden]="!isVisible(idx)">
                    <div class="w-full h-full p-4 sm:p-8">
                        <div class="w-full h-full rounded-xl sm:rounded-2xl overflow-hidden relative group bg-bgSeco">
                            <img [src]="slide.image" 
                                 [alt]="slide.title" 
                                 class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 " 
                                 loading="lazy" />
                            <div class=" absolute inset-0 bg-gradient-to-br from-gray-700/70 via-gray-700/0 to-transparent mix-blend-overlay "></div>
                            <div class="absolute inset-x-0 bottom-0 p-4 sm:p-8 bg-gradient-to-t from-black/80 via-black/40 to-transparent">
                                <h3 class="text-white text-xl sm:text-2xl md:text-3xl font-bold mb-2 sm:mb-3">{{ slide.title }}</h3>
                                <p class="text-gray-200 text-sm sm:text-base md:text-lg max-w-2xl">{{ slide.description }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            }
        </div>
        <div class="absolute left-1/2 -translate-x-1/2 flex gap-1 sm:gap-2 z-20">
                @for (slide of slides(); track slide.id; let idx = $index) {
                <a class="hover:bg-white/60 w-8 sm:w-12 h-1 sm:h-1.5 rounded-full transition-colors"
                        [class.bg-white/40]="idx === currentSlide()"
                        [class.bg-white/20]="idx !== currentSlide()"
                        (click)="goToSlide(idx)"
                        [attr.title]="'Go to slide ' + (idx + 1)">
                </a>
            }

            </div>
        
    </div>
</div>

    </div>
